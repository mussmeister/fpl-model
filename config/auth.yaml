# FPL Dashboard Authentication
#
# SETUP STEPS:
#   1. Hash your password:
#        python scripts/hash_password.py yourpassword
#      Paste the output into dom.password below.
#
#   2. Generate a random cookie key:
#        python -c "import secrets; print(secrets.token_hex(16))"
#      Paste into cookie.key below.
#
#   3. (Optional) Google OAuth — requires HTTPS on your domain:
#      a. Create a project at https://console.cloud.google.com/
#      b. APIs & Services > Credentials > OAuth 2.0 Client ID (Web application)
#      c. Authorised redirect URI: https://fplmodel.themuzzies.co.uk/
#      d. Paste client_id and client_secret below.
#
#   4. To add members:
#      - Google login: add their Gmail to member_emails below
#      - Password login: add a new block under credentials.usernames

credentials:
  usernames:
    dom:
      email: dom.musgrove@gmail.com
      name: Dom
      password: ""       # paste bcrypt hash here after step 1
      role: admin

cookie:
  name: fpl_dashboard_auth
  key: "REPLACE_WITH_RANDOM_32_CHAR_KEY"   # see step 2
  expiry_days: 30

oauth2:
  google:
    client_id: ""        # from Google Cloud Console (step 3)
    client_secret: ""
    redirect_uri: "https://fplmodel.themuzzies.co.uk/"

# Google login allowlist
admin_emails:
  - dom.musgrove@gmail.com
member_emails: []
  # - friend@gmail.com
